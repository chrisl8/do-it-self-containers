services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr
    # Homarr needs root for nginx and Next.js cache directories
    volumes:
      - ${VOL_HOMARR_APPDATA:-~/container-data}/container-mounts/homarr/appdata:/appdata
    environment:
      - TZ=America/Chicago
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}
      # Next.js binds to the container network IP by default; override to bind all interfaces
      - HOSTNAME=0.0.0.0
      # OIDC via Tailscale TSIDP
      - AUTH_OIDC_ISSUER=https://tsidp.${TS_DOMAIN}
      - AUTH_OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - AUTH_OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - AUTH_OIDC_CLIENT_NAME=Tailscale
      - AUTH_OIDC_AUTO_LOGIN=true
      # TSIDP only supports openid, email, profile — not "groups" which Homarr requests by default
      - AUTH_OIDC_SCOPE_OVERWRITE=openid email profile
      - AUTH_PROVIDERS=credentials,oidc
      # NextAuth needs the external URL to construct correct callback URIs behind the TS proxy
      - AUTH_URL=https://home.${TS_DOMAIN}
    networks:
      - homarr-net
    labels:
      # For homepage
      - homepage.group=Tools
      - homepage.name=Homarr
      - homepage.icon=homarr
      - homepage.href=https://home.${TS_DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    restart: on-failure
  ts:
    container_name: homarr-ts
    image: tailscale/tailscale
    environment:
      - TS_HOSTNAME=home
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/tailscale-config.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
      - TS_AUTHKEY=${TS_AUTHKEY}
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - ./tailscale-config:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    # https://github.com/tailscale/tailscale/issues/12758#issuecomment-2564770640
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    networks:
      - homarr-net
    depends_on:
      homarr:
        condition: service_healthy
    restart: on-failure
networks:
  homarr-net:
