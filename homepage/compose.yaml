services:
  homepage:
    image: ghcr.io/gethomepage/homepage
    container_name: homepage
    user: 1000:1000
    # This must be the ID of the Docker group.
    group_add:
      - ${DOCKER_GID:-985}
    volumes:
      # config/ is generated by scripts/merge-homepage-config.js from
      # config-defaults/ (in git) + config-personal/ (gitignored).
      - ./config:/app/config
      - ./images:/app/public/images
      - ./icons:/app/public/icons
      - ./dashboard-icons:/app/public/dashboard-icons
      - /var/run/docker.sock:/var/run/docker.sock # docker integration
      # Storage monitoring bind mounts (one per user-config mount) are
      # added by scripts/regenerate-monitoring-mounts.js, which writes a
      # gitignored compose.override.yaml that Docker Compose auto-loads.
    networks:
      - homepage-net
    environment:
      HOMEPAGE_ALLOWED_HOSTS: console.${TS_DOMAIN}
    # healthcheck: is built into this app, no need to add one.
    restart: on-failure
  ts:
    container_name: homepage-ts
    image: tailscale/tailscale
    environment:
      - TS_HOSTNAME=console
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/tailscale-config.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
      - TS_AUTHKEY=${TS_AUTHKEY}
    volumes:
      - ${TS_STATE_HOST_DIR}:/var/lib/tailscale
      - ./tailscale-config:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    # https://github.com/tailscale/tailscale/issues/12758#issuecomment-2564770640
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    networks:
      - homepage-net
    depends_on:
      homepage:
        condition: service_healthy
    restart: on-failure
networks:
  homepage-net:
