name: do-it-self-containers
description: All generally-useful self-hosted container stacks
maintainer: chrisl8
url: https://github.com/chrisl8/do-it-self-containers.git
categories:
  my-stuff:
    label: My Stuff
  uncategorized:
    label: Uncategorized
  system-monitoring:
    label: System Monitoring
  tools:
    label: Tools
  reading:
    label: Reading
  favorites:
    label: Favorites
  kanboard:
    label: KanBoard
  desktop-apps:
    label: Desktop Apps
  recon:
    label: Recon
  home:
    label: Home
containers:
  actual-budget:
    description: Privacy-focused personal budgeting app
    category: my-stuff
    uses_tailscale: true
    volumes:
      data:
        var: VOL_ACTUAL_BUDGET_DATA
        host_subpath: container-mounts/actual-budget/data
        container_path: /data
    default_disabled: true
  actual-budget-api:
    description: Actual Budget API server
    category: uncategorized
    uses_tailscale: true
    variables:
      ACTUAL_SERVER_PASSWORD:
        type: secret
        required: true
        description: Password for the Actual Budget server
      API_KEY:
        type: secret
        required: false
        description: API key for homepage widget
      SYNC_ID:
        type: secret
        required: false
        description: Budget Sync ID used by the actual-budget-sync host cron (Settings → Show advanced settings → Sync ID)
    volumes:
      actual_api_data:
        var: VOL_ACTUAL_BUDGET_API_ACTUAL_API_DATA
        host_subpath: container-mounts/actual-api/data
        container_path: /data
    default_disabled: true
  adminer:
    description: Lightweight database management web UI
    category: uncategorized
    default_disabled: true
  beszel:
    description: Server monitoring dashboard
    category: system-monitoring
    uses_docker_gid: true
    variables:
      KEY:
        type: secret
        required: true
        description: Beszel agent authentication key
        auto_generate: true
      SYSTEM_ID_FOR_HOMEPAGE:
        type: string
        required: false
        description: System identifier for homepage widget URL
      USERNAME_FOR_HOMEPAGE:
        type: string
        required: false
        description: Beszel username for homepage widget
      PASSWORD_FOR_HOMEPAGE:
        type: secret
        required: false
        description: Beszel password for homepage widget
    monitor_all_mounts: true
    volumes:
      data:
        var: VOL_BESZEL_DATA
        host_subpath: container-mounts/beszel/data
        container_path: /beszel_data
    default_disabled: true
  borgitory:
    description: Web UI for browsing BorgBackup repositories
    category: tools
    uses_tailscale: true
    volumes:
      data:
        var: VOL_BORGITORY_DATA
        host_subpath: container-mounts/borgitory/data
        container_path: /app/data
      borg_repo:
        var: VOL_BORGITORY_BORG_REPO
        host_subpath: borg-repo
        container_path: /mnt/repos/local
    default_disabled: true
  changedetection:
    description: Website change detection and notification
    category: reading
    uses_tailscale: true
    variables:
      API_KEY:
        type: secret
        required: false
        description: API key for homepage widget
    volumes:
      data:
        var: VOL_CHANGEDETECTION_DATA
        host_subpath: container-mounts/changedetection/data
        container_path: /datastore
    default_disabled: true
  cloudflared:
    description: Cloudflare Tunnel for external access without port forwarding
    category: uncategorized
    start_order: "029"
    variables:
      TUNNEL_TOKEN:
        type: secret
        required: true
        description: Cloudflare Tunnel authentication token
    volumes:
      config:
        var: VOL_CLOUDFLARED_CONFIG
        host_subpath: container-mounts/cloudflared/config
        container_path: /home/nonroot/.cloudflared
    default_disabled: true
  code:
    description: VS Code Server in the browser
    category: my-stuff
    uses_tailscale: true
    volumes:
      home:
        var: VOL_CODE_HOME
        host_subpath: container-mounts/code/home
        container_path: /home/coder
    default_disabled: true
  dawarich:
    description: Self-hosted location history and tracking
    category: favorites
    uses_tailscale: true
    start_order: z010
    variables:
      DATABASE_PASSWORD:
        type: secret
        required: true
        description: PostgreSQL database password
        auto_generate: true
      SECRET_KEY_BASE:
        type: secret
        required: true
        description: Rails secret key for session encryption
        auto_generate: true
      API_KEY:
        type: secret
        required: false
        description: API key for homepage widget
      OIDC_CLIENT_ID:
        type: string
        required: false
        description: OIDC client ID for SSO integration
      OIDC_CLIENT_SECRET:
        type: secret
        required: false
        description: OIDC client secret for SSO integration
    volumes:
      redis_data:
        var: VOL_DAWARICH_REDIS_DATA
        host_subpath: container-mounts/dawarich/redis_data
        container_path: /data
      db_data:
        var: VOL_DAWARICH_DB_DATA
        host_subpath: container-mounts/dawarich/db_data
        container_path: /var/lib/postgresql/data
      public:
        var: VOL_DAWARICH_PUBLIC
        host_subpath: container-mounts/dawarich/public
        container_path: /var/app/public
      watched:
        var: VOL_DAWARICH_WATCHED
        host_subpath: container-mounts/dawarich/watched
        container_path: /var/app/tmp/imports/watched
      storage:
        var: VOL_DAWARICH_STORAGE
        host_subpath: container-mounts/dawarich/storage
        container_path: /var/app/storage
    default_disabled: true
  diun:
    description: Docker Image Update Notifier
    category: uncategorized
    uses_docker_gid: true
    volumes:
      data:
        var: VOL_DIUN_DATA
        host_subpath: container-mounts/diun/data
        container_path: /data
      script:
        var: VOL_DIUN_SCRIPT
        host_subpath: container-mounts/diun/script
        container_path: /script
    default_disabled: true
  factorio:
    description: Factorio dedicated game server
    category: uncategorized
    uses_tailscale: true
    volumes:
      data:
        var: VOL_FACTORIO_DATA
        host_subpath: container-mounts/factorio/data
        container_path: /factorio
    default_disabled: true
  filez:
    description: Simple file browser and manager
    category: my-stuff
    uses_tailscale: true
    volumes:
      data:
        var: VOL_FILEZ_DATA
        host_subpath: container-mounts/filez/data
        container_path: /data/root
      secure_webtop_downloads:
        var: VOL_FILEZ_SECURE_WEBTOP_DOWNLOADS
        host_subpath: container-mounts/secure-webtop/downloads
        container_path: /data/downloads
    default_disabled: true
  forgejo:
    description: Self-hosted Git forge (Gitea fork)
    category: my-stuff
    uses_tailscale: true
    start_order: "040"
    volumes:
      data:
        var: VOL_FORGEJO_DATA
        host_subpath: container-mounts/forgejo/data
        container_path: /data
    default_disabled: true
  formbricks:
    description: Open-source survey and feedback platform
    category: uncategorized
    variables:
      WEBAPP_URL:
        type: string
        required: true
        description: Public URL for the Formbricks web app
      NEXTAUTH_URL:
        type: string
        required: true
        description: NextAuth callback URL (usually same as WEBAPP_URL)
      NEXTAUTH_SECRET:
        type: secret
        required: true
        description: Secret for NextAuth session encryption
        auto_generate: true
      ENCRYPTION_KEY:
        type: secret
        required: true
        description: Encryption key for stored data
        auto_generate: true
      CRON_SECRET:
        type: secret
        required: true
        description: Secret for cron job authentication
        auto_generate: true
    volumes:
      data:
        var: VOL_FORMBRICKS_DATA
        host_subpath: container-mounts/formbricks/data
        container_path: /var/lib/postgresql/data
      redis:
        var: VOL_FORMBRICKS_REDIS
        host_subpath: container-mounts/formbricks/redis
        container_path: /data
      saml_connection:
        var: VOL_FORMBRICKS_SAML_CONNECTION
        host_subpath: container-mounts/formbricks/saml-connection
        container_path: /home/nextjs/apps/web/saml-connection
    default_disabled: true
  freshrss:
    description: Self-hosted RSS feed reader
    category: reading
    uses_tailscale: true
    variables:
      FRESHRSS_USERNAME:
        type: string
        required: true
        description: Default admin username
      FRESHRSS_PASSWORD:
        type: secret
        required: true
        description: Default admin password
    volumes:
      data:
        var: VOL_FRESHRSS_DATA
        host_subpath: container-mounts/freshrss/data
        container_path: /var/www/FreshRSS/data
      extensions:
        var: VOL_FRESHRSS_EXTENSIONS
        host_subpath: container-mounts/freshrss/extensions
        container_path: /var/www/FreshRSS/extensions
    default_disabled: true
  homarr:
    description: Customizable dashboard for self-hosted services
    category: tools
    uses_tailscale: true
    variables:
      SECRET_ENCRYPTION_KEY:
        type: secret
        required: true
        description: Encryption key for stored secrets
        auto_generate: true
      OIDC_CLIENT_ID:
        type: string
        required: false
        description: OIDC client ID for SSO integration
      OIDC_CLIENT_SECRET:
        type: secret
        required: false
        description: OIDC client secret for SSO integration
    volumes:
      appdata:
        var: VOL_HOMARR_APPDATA
        host_subpath: container-mounts/homarr/appdata
        container_path: /appdata
    default_disabled: true
  homepage:
    description: Application dashboard with service widgets
    category: uncategorized
    uses_tailscale: true
    uses_docker_gid: true
    start_order: "002"
    monitor_all_mounts: true
    git_repos:
      dashboard-icons:
        url: https://github.com/homarr-labs/dashboard-icons.git
        shallow: true
  immich:
    description: Self-hosted photo and video backup
    category: my-stuff
    uses_tailscale: true
    start_order: "020"
    variables:
      DB_PASSWORD:
        type: secret
        required: true
        description: PostgreSQL database password
        auto_generate: true
      API_KEY:
        type: secret
        required: false
        description: API key for homepage widget
    volumes:
      photos:
        var: VOL_IMMICH_PHOTOS
        host_subpath: container-mounts/immich/photos
        container_path: /data
      db:
        var: VOL_IMMICH_DB
        host_subpath: container-mounts/immich/db
        container_path: /var/lib/postgresql/data
    default_disabled: true
  infisical:
    description: Self-hosted secret manager for credential injection
    category: uncategorized
    uses_tailscale: false
    start_order: "000"
    volumes:
      db:
        var: VOL_INFISICAL_DB
        host_subpath: container-mounts/infisical/db
        container_path: /var/lib/postgresql/data
      redis:
        var: VOL_INFISICAL_REDIS
        host_subpath: container-mounts/infisical/redis
        container_path: /data
  jellyfin:
    description: Media server for movies, TV, music, and audiobooks
    category: my-stuff
    uses_tailscale: true
    requires_gpu: true
    variables:
      API_KEY:
        type: secret
        required: false
        description: API key for homepage widget
    volumes:
      config:
        var: VOL_JELLYFIN_CONFIG
        host_subpath: container-mounts/jellyfin/config
        container_path: /config
      cache:
        var: VOL_JELLYFIN_CACHE
        host_subpath: container-mounts/jellyfin/cache
        container_path: /cache
      music:
        var: VOL_JELLYFIN_MUSIC
        host_subpath: container-mounts/jellyfin/music
        container_path: /media/music
      videos:
        var: VOL_JELLYFIN_VIDEOS
        host_subpath: container-mounts/jellyfin/videos
        container_path: /media/videos
      movies:
        var: VOL_JELLYFIN_MOVIES
        host_subpath: container-mounts/jellyfin/movies
        container_path: /media/movies
      data:
        var: VOL_JELLYFIN_DATA
        host_subpath: container-mounts/jellyfin
        container_path: /media/downloads
      audiobooks:
        var: VOL_JELLYFIN_AUDIOBOOKS
        host_subpath: container-mounts/jellyfin/audiobooks
        container_path: /media/audiobooks
      recon_data_media:
        var: VOL_JELLYFIN_RECON_DATA_MEDIA
        host_subpath: container-mounts/recon/data/media
        container_path: /media/recon
    default_disabled: true
  kanboard:
    description: Kanban project management board
    category: kanboard
    uses_tailscale: true
    volumes:
      data:
        var: VOL_KANBOARD_DATA
        host_subpath: container-mounts/kanboard/data
        container_path: /var/www/app/data
      plugins:
        var: VOL_KANBOARD_PLUGINS
        host_subpath: container-mounts/kanboard/plugins
        container_path: /var/www/app/plugins
      nginx_ssl:
        var: VOL_KANBOARD_NGINX_SSL
        host_subpath: container-mounts/kanboard/nginx_ssl
        container_path: /etc/nginx/ssl
    default_disabled: true
  karakeep:
    description: Bookmark and read-it-later manager
    category: reading
    uses_tailscale: true
    variables:
      HOME_PAGE_API_KEY:
        type: secret
        required: false
        description: API key for homepage widget
      NEXTAUTH_SECRET:
        type: secret
        required: true
        description: Secret for NextAuth session encryption
        auto_generate: true
      NEXT_PUBLIC_SECRET:
        type: secret
        required: true
        description: Public-facing secret for client-side auth
        auto_generate: true
      MEILI_MASTER_KEY:
        type: secret
        required: true
        description: Master key for MeiliSearch full-text search
        auto_generate: true
    volumes:
      data:
        var: VOL_KARAKEEP_DATA
        host_subpath: container-mounts/karakeep/data
        container_path: /data
      meilisearch:
        var: VOL_KARAKEEP_MEILISEARCH
        host_subpath: container-mounts/karakeep/meilisearch
        container_path: /meili_data
    default_disabled: true
  kopia:
    description: Backup repository server with web UI
    category: favorites
    variables:
      SERVER_USERNAME:
        type: string
        required: true
        description: Web UI login username
      SERVER_PASSWORD:
        type: secret
        required: true
        description: Web UI login password
      KOPIA_PASSWORD:
        type: secret
        required: true
        description: Repository encryption password
        auto_generate: true
      USER:
        type: string
        required: true
        description: System user identity for Kopia
      SYSTEM_IP_ADDRESS:
        type: string
        required: true
        description: Local IP address for dashboard link
    volumes:
      config:
        var: VOL_KOPIA_CONFIG
        host_subpath: container-mounts/kopia/config
        container_path: /app/config
      cache:
        var: VOL_KOPIA_CACHE
        host_subpath: container-mounts/kopia/cache
        container_path: /app/cache
      logs:
        var: VOL_KOPIA_LOGS
        host_subpath: container-mounts/kopia/logs
        container_path: /app/logs
      repository:
        var: VOL_KOPIA_REPOSITORY
        host_subpath: container-mounts/kopia/repository
        container_path: /repository
      tmp:
        var: VOL_KOPIA_TMP
        host_subpath: container-mounts/kopia/tmp
        container_path: /tmp:shared
    default_disabled: true
  mame:
    description: MAME arcade emulator in the browser
    category: desktop-apps
    uses_tailscale: true
    requires_gpu: true
    default_disabled: true
    volumes:
      config:
        var: VOL_MAME_CONFIG
        host_subpath: container-mounts/mame/config
        container_path: /config
      extras:
        var: VOL_MAME_EXTRAS
        host_subpath: container-mounts/secure-webtop/downloads/mame/MAME 0.276 EXTRAs
        container_path: /mame
      roms:
        var: VOL_MAME_ROMS
        host_subpath: container-mounts/secure-webtop/downloads/mame/MAME 0.279 ROMs (merged)
        container_path: /mame/roms
      chds:
        var: VOL_MAME_CHDS
        host_subpath: container-mounts/secure-webtop/downloads/mame/MAME 0.279 CHDs (merged)
        container_path: /mame/chds
  mariadb:
    description: Shared MariaDB database server
    category: uncategorized
    start_order: "001"
    variables:
      MARIADB_ROOT_PASSWORD:
        type: secret
        required: true
        description: MariaDB root password
        auto_generate: true
    volumes:
      db:
        var: VOL_MARIADB_DB
        host_subpath: container-mounts/mariadb/db
        container_path: /var/lib/mysql
    default_disabled: true
  meshtastic:
    description: Meshtastic mesh networking web client
    category: uncategorized
    start_order: "031"
    default_disabled: true
    variables:
      MESHTASTIC_DB_USER:
        type: string
        required: true
        description: Database username
      MESHTASTIC_DB_PASSWORD:
        type: secret
        required: true
        description: Database password
        auto_generate: true
      ADMIN_PASSWORD:
        type: secret
        required: true
        description: Admin panel password
  minecraft:
    description: Minecraft Bedrock Edition dedicated server
    category: uncategorized
    uses_tailscale: true
    git_repos:
      docker-minecraft-bedrock-server:
        url: https://github.com/itzg/docker-minecraft-bedrock-server.git
    volumes:
      data:
        var: VOL_MINECRAFT_DATA
        host_subpath: container-mounts/minecraft/data
        container_path: /data
    default_disabled: true
  netdata:
    description: Real-time server performance monitoring
    category: system-monitoring
    uses_tailscale: true
    uses_docker_gid: true
    start_order: z090
    volumes:
      netdataconfig:
        var: VOL_NETDATA_NETDATACONFIG
        host_subpath: container-mounts/netdata/netdataconfig
        container_path: /etc/netdata
      netdatalib:
        var: VOL_NETDATA_NETDATALIB
        host_subpath: container-mounts/netdata/netdatalib
        container_path: /var/lib/netdata
      netdatacache:
        var: VOL_NETDATA_NETDATACACHE
        host_subpath: container-mounts/netdata/netdatacache
        container_path: /var/cache/netdata
    default_disabled: true
  nextcloud:
    description: Self-hosted cloud storage, calendar, and contacts
    category: my-stuff
    uses_tailscale: true
    start_order: "010"
    variables:
      MYSQL_ROOT_PASSWORD:
        type: secret
        required: true
        description: Root password for the MariaDB instance
        auto_generate: true
      MYSQL_PASSWORD:
        type: secret
        required: true
        description: Database password for the nextcloud user
        auto_generate: true
      NEXTCLOUD_ADMIN_USER:
        type: string
        required: true
        description: Initial admin username
      NEXTCLOUD_ADMIN_PASSWORD:
        type: secret
        required: true
        description: Initial admin password
      USERNAME_FOR_HOMEPAGE:
        type: string
        required: false
        description: Nextcloud username for homepage widget
      PASSWORD_FOR_HOMEPAGE:
        type: secret
        required: false
        description: Nextcloud password for homepage widget
      COLLABORA_ADMIN_USERNAME:
        type: string
        required: false
        description: Collabora Online admin username
      COLLABORA_ADMIN_PASSWORD:
        type: secret
        required: false
        description: Collabora Online admin password
      ELASTIC_PASSWORD:
        type: secret
        required: true
        description: Password for Elasticsearch full-text search
        auto_generate: true
    volumes:
      html:
        var: VOL_NEXTCLOUD_HTML
        host_subpath: container-mounts/nextcloud/html
        container_path: /var/www/html
      db:
        var: VOL_NEXTCLOUD_DB
        host_subpath: container-mounts/nextcloud/db
        container_path: /var/lib/mysql
      elasticsearch_data:
        var: VOL_NEXTCLOUD_ELASTICSEARCH_DATA
        host_subpath: container-mounts/nextcloud/elasticsearch_data
        container_path: /usr/share/elasticsearch/data
    default_disabled: true
  nextcloud-whiteboard:
    description: Collaborative whiteboard for Nextcloud
    category: uncategorized
    uses_tailscale: true
    start_order: "012"
    default_disabled: true
    variables:
      WHITEBOARD_JWT_SECRET_KEY:
        type: secret
        required: true
        description: JWT secret for whiteboard authentication
        auto_generate: true
  obsidian:
    description: Obsidian note-taking app in the browser via KasmVNC
    category: desktop-apps
    uses_tailscale: true
    requires_gpu: true
    volumes:
      config:
        var: VOL_OBSIDIAN_CONFIG
        host_subpath: container-mounts/obsidian/config
        container_path: /config
    default_disabled: true
  obsidian-babel-livesync:
    description: CouchDB sync server for Obsidian LiveSync plugin
    category: uncategorized
    uses_tailscale: true
    variables:
      COUCHDB_USER:
        type: string
        required: true
        description: CouchDB admin username
      COUCHDB_PASSWORD:
        type: secret
        required: true
        description: CouchDB admin password
        auto_generate: true
    volumes:
      data:
        var: VOL_OBSIDIAN_BABEL_LIVESYNC_DATA
        host_subpath: container-mounts/obsidian-babel-livesync/data
        container_path: /opt/couchdb/data
    default_disabled: true
  onlyoffice:
    description: Online office suite for document editing
    category: uncategorized
    uses_tailscale: true
    start_order: "011"
    variables:
      JWT_SECRET:
        type: secret
        required: true
        description: JWT secret for OnlyOffice integration
        auto_generate: true
    volumes:
      data:
        var: VOL_ONLYOFFICE_DATA
        host_subpath: container-mounts/onlyoffice/data
        container_path: /var/www/onlyoffice/Data
      log:
        var: VOL_ONLYOFFICE_LOG
        host_subpath: container-mounts/onlyoffice/log
        container_path: /var/log/onlyoffice
      cache:
        var: VOL_ONLYOFFICE_CACHE
        host_subpath: container-mounts/onlyoffice/cache
        container_path: /var/lib/onlyoffice/documentserver/App_Data/cache/files
      www:
        var: VOL_ONLYOFFICE_WWW
        host_subpath: container-mounts/onlyoffice/www
        container_path: /var/www/onlyoffice/documentserver-example/public/files
      fonts:
        var: VOL_ONLYOFFICE_FONTS
        host_subpath: container-mounts/onlyoffice/fonts
        container_path: /usr/share/fonts
      db_data:
        var: VOL_ONLYOFFICE_DB_DATA
        host_subpath: container-mounts/onlyoffice/db_data
        container_path: /var/lib/postgresql/data
    default_disabled: true
  paperless:
    description: Document management system with OCR
    category: my-stuff
    uses_tailscale: true
    variables:
      PAPERLESS_SECRET_KEY:
        type: secret
        required: true
        description: Django secret key for session encryption
        auto_generate: true
      API_KEY:
        type: secret
        required: false
        description: API key for homepage widget
    volumes:
      paperless_ngx_data:
        var: VOL_PAPERLESS_PAPERLESS_NGX_DATA
        host_subpath: container-mounts/paperless-ngx/data
        container_path: /usr/src/paperless/data
      paperless_ngx_media:
        var: VOL_PAPERLESS_PAPERLESS_NGX_MEDIA
        host_subpath: container-mounts/paperless-ngx/media
        container_path: /usr/src/paperless/media
      paperless_ngx_export:
        var: VOL_PAPERLESS_PAPERLESS_NGX_EXPORT
        host_subpath: container-mounts/paperless-ngx/export
        container_path: /usr/src/paperless/export
      ScanHere:
        var: VOL_PAPERLESS_SCANHERE
        host_subpath: samba/ScanHere
        container_path: /usr/src/paperless/consume
      paperless_ngx_database:
        var: VOL_PAPERLESS_PAPERLESS_NGX_DATABASE
        host_subpath: container-mounts/paperless-ngx/database
        container_path: /var/lib/postgresql/data
    default_disabled: true
  paste:
    description: Self-hosted pastebin and code sharing
    category: tools
    uses_tailscale: true
    variables:
      PASTE_DB_ROOT_PASSWORD:
        type: secret
        required: true
        description: MariaDB root password
        auto_generate: true
      PASTE_DB_PASSWORD:
        type: secret
