services:
  beszel:
    image: henrygd/beszel
    container_name: beszel
    user: 1000:1000
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - 8090:8090
    environment:
      - USER_CREATION=true
    volumes:
      - ${VOL_BESZEL_DATA:-~/container-data}/container-mounts/beszel/data:/beszel_data
      - ./healthcheck:/healthcheck
    healthcheck:
      test: ["CMD", "/healthcheck/get-home-page"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    labels:
      # For homepage
      - homepage.group=${HOMEPAGE_GROUP}
      - homepage.name=Beszel
      - homepage.weight=10
      - homepage.icon=/dashboard-icons/svg/beszel.svg
      - homepage.href=http://${HOST_NAME}.${TS_DOMAIN}:8090/system/${SYSTEM_ID_FOR_HOMEPAGE}
      - homepage.widget.type=beszel
      - homepage.widget.url=http://${HOST_NAME}.${TS_DOMAIN}:8090
      - homepage.widget.systemId=${SYSTEM_ID_FOR_HOMEPAGE}
      - homepage.widget.username=${USERNAME_FOR_HOMEPAGE}
      - homepage.widget.password=${PASSWORD_FOR_HOMEPAGE}
      - homepage.widget.version=2
    restart: on-failure
  # There is no tailscale for this container, it is just exposed locally and can be connected to via the host's tailscale connection.
  # That could be changed, but I didn't see the point.
  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    user: 1000:1000
    # This must be the ID of the Docker group.
    group_add:
      - ${DOCKER_GID:-985}
    # The agent must run as root to get metrics from all docker containers.
    # The agent must use host network mode to access network interface metrics.
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Storage monitoring mounts (one per user-config mount) are added by
      # scripts/regenerate-monitoring-mounts.js, which writes a gitignored
      # compose.override.yaml that Docker Compose auto-loads.
      - ./healthcheck:/healthcheck
    environment:
      PORT: 45876
      KEY: ${KEY}
    healthcheck:
      test: ["CMD", "/healthcheck/checkForAgentProcess"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    restart: on-failure
