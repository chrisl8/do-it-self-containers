services:
  obsidian:
    # https://docs.linuxserver.io/images/docker-obsidian/
    # Web-based access to Obsidian desktop app via Selkies-GStreamer WebRTC
    image: lscr.io/linuxserver/obsidian
    container_name: obsidian
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ${VOL_OBSIDIAN_CONFIG:-~/container-data}/container-mounts/obsidian/config:/config
    shm_size: "1gb"
    network_mode: service:ts
    labels:
      # For homepage
      - homepage.group=${HOMEPAGE_GROUP}
      - homepage.name=Obsidian
      - homepage.weight=100
      - homepage.icon=obsidian
      - homepage.href=https://obsidian.${TS_DOMAIN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    restart: on-failure
    depends_on:
      ts:
        condition: service_healthy
  ts:
    container_name: obsidian-ts
    image: tailscale/tailscale
    environment:
      - TS_HOSTNAME=obsidian
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/tailscale-config.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
      - TS_AUTHKEY=${TS_AUTHKEY}
    volumes:
      - ${TS_STATE_HOST_DIR}:/var/lib/tailscale
      - ./tailscale-config:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    # https://github.com/tailscale/tailscale/issues/12758#issuecomment-2564770640
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    restart: on-failure
