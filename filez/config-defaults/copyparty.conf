# not actually YAML but lets pretend:
# -*- mode: yaml -*-
# vim: ft=yaml:

# Default copyparty config shipped with the filez module.
# To customize (add accounts, allow uploads, etc.), copy this file to
# config-personal/copyparty.conf and edit there. Files in config-personal/
# take precedence over config-defaults/ and are preserved across module
# updates. The container's ./copyparty.conf is regenerated from these at
# every start by the config-defaults handler in scripts/all-containers.sh.

[global]
  e2dsa  # enable file indexing and filesystem scanning
  e2ts   # enable multimedia indexing
  ansi   # enable colors in log messages (both in logfiles and stdout)
  ver    # show copyparty version in the controlpanel
  name: Filez
  xff-hdr: x-forwarded-for
  xff-src: lan
  rproxy: -1

# Uncomment and customize in config-personal/copyparty.conf to enable auth:
# [accounts]
#   yourname: change-me

[/]            # webroot, mapped from /data/root in compose.yaml
  /data/root
  accs:
    r: *       # anonymous read-only by default

[/downloads]   # mapped from /data/downloads in compose.yaml
  /data/downloads
  accs:
    r: *
