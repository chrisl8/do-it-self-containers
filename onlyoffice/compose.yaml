services:
  onlyoffice-documentserver:
    image: onlyoffice/documentserver
    container_name: onlyoffice-documentserver
    depends_on:
      - onlyoffice-postgresql
      - onlyoffice-rabbitmq
    environment:
      - DB_TYPE=postgres
      - DB_HOST=onlyoffice-postgresql
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=onlyoffice
      - AMQP_URI=amqp://guest:guest@onlyoffice-rabbitmq
      # Uncomment strings below to enable the JSON Web Token validation.
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    # ports:
    #   - '80:80'
    #   - '443:443'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/info/info.json"]
      interval: 30s
      retries: 5
      start_period: 60s
      timeout: 10s
    stdin_open: true
    stop_grace_period: 60s
    volumes:
      - ${VOL_ONLYOFFICE_DATA:-~/container-data}/container-mounts/onlyoffice/data:/var/www/onlyoffice/Data
      - ${VOL_ONLYOFFICE_LOG:-~/container-data}/container-mounts/onlyoffice/log:/var/log/onlyoffice
      - ${VOL_ONLYOFFICE_CACHE:-~/container-data}/container-mounts/onlyoffice/cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
      - ${VOL_ONLYOFFICE_WWW:-~/container-data}/container-mounts/onlyoffice/www:/var/www/onlyoffice/documentserver-example/public/files
      - ${VOL_ONLYOFFICE_FONTS:-~/container-data}/container-mounts/onlyoffice/fonts:/usr/share/fonts
    networks:
      - onlyoffice-net
    restart: on-failure
  onlyoffice-rabbitmq:
    container_name: onlyoffice-rabbitmq
    image: rabbitmq:3
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 10s
    networks:
      - onlyoffice-net
    restart: on-failure
  onlyoffice-postgresql:
    container_name: onlyoffice-postgresql
    image: postgres:15
    environment:
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - ${VOL_ONLYOFFICE_DB_DATA:-~/container-data}/container-mounts/onlyoffice/db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyoffice"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 10s
    networks:
      - onlyoffice-net
    restart: on-failure
  ts:
    container_name: onlyoffice-ts
    image: tailscale/tailscale
    environment:
      - TS_HOSTNAME=onlyoffice
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/tailscale-config.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
      - TS_AUTHKEY=${TS_AUTHKEY}
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - ./tailscale-config:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    # https://github.com/tailscale/tailscale/issues/12758#issuecomment-2564770640
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    networks:
      - onlyoffice-net
    depends_on:
      onlyoffice-documentserver:
        condition: service_healthy
    restart: on-failure
networks:
  onlyoffice-net:
