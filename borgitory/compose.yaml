# Borgitory — Web GUI for browsing BorgBackup repositories
# https://github.com/mlapaglia/borgitory
services:
  borgitory:
    image: mlapaglia/borgitory
    container_name: borgitory
    # FUSE needed for archive browsing
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    volumes:
      # Persistent app data (SQLite DB, config, encryption keys)
      - ${VOL_BORGITORY_DATA:-~/container-data}/container-mounts/borgitory/data:/app/data
      # Borg repository (read-only — browsing only, no modifications)
      - ${VOL_BORGITORY_BORG_REPO:-~/container-data}/borg-repo:/mnt/repos/local
    networks:
      - borgitory-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/')",
        ]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    labels:
      - homepage.group=Tools
      - homepage.name=Borgitory
      - homepage.icon=/icons/borg-favicon-32x32.png
      - homepage.href=https://borgitory.${TS_DOMAIN}
      - homepage.weight=50
    restart: on-failure
  ts:
    container_name: borgitory-ts
    image: tailscale/tailscale
    environment:
      - TS_HOSTNAME=borgitory
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/tailscale-config.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
      - TS_AUTHKEY=${TS_AUTHKEY}
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - ./tailscale-config:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    networks:
      - borgitory-net
    depends_on:
      borgitory:
        condition: service_healthy
    restart: on-failure
networks:
  borgitory-net:
