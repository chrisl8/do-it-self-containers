; Default CouchDB local.d config shipped with the obsidian-babel-livesync module.
; To customize (set the admin user, change CORS origins, etc.), copy this file to
; config-personal/docker.ini and edit there. Files in config-personal/ take
; precedence over config-defaults/ and are preserved across module updates.
; The container's ./docker.ini is regenerated from these at every start by the
; config-defaults handler in scripts/all-containers.sh.

[admins]
; Set the CouchDB admin in config-personal/docker.ini, e.g.:
;   obsidian-babel-livesync = -pbkdf2:<hash>,<salt>,<iterations>
; Generate via the CouchDB Fauxton UI on first start, then copy the hashed
; line out of the resulting local.ini into your config-personal/docker.ini.

[chttpd]
require_valid_user = true
max_http_request_size = 4294967296

[chttpd_auth]
require_valid_user = true

[httpd]
WWW-Authenticate = Basic realm="couchdb"
enable_cors = true

[couchdb]
max_document_size = 50000000
; uuid is intentionally omitted — CouchDB generates one on first start.
; Baking a default here would cause UUID collisions across deployments.

[cors]
credentials = true
origins = app://obsidian.md,capacitor://localhost,http://localhost
