services:
  pihole:
    image: pihole/pihole
    container_name: pihole
    # networks:
    #   pihole:
    #     ipv4_address: 172.20.0.2
    # dns:
    #   - 127.0.0.1
    #   - 1.1.1.1
    ports:
      - target: 53
        published: 53
        protocol: tcp
      - target: 53
        published: 53
        protocol: udp
      - target: 67
        published: 67
        protocol: udp
      - target: 80
        published: 8099
        protocol: tcp
      # - target: 443
      #   published: 443
      #   protocol: tcp
    environment:
      - TZ=America/Chicago
      - PROXY_LOCATION=pihole
      - VIRTUAL_PORT=80
      - PIHOLE_DNS_=cloudflared#5053
    volumes:
      - ${VOL_PIHOLE_ETC:-~/container-data}/container-mounts/pihole/etc:/etc/pihole
      - ${VOL_PIHOLE_DNSMASQ:-~/container-data}/container-mounts/pihole/dnsmasq:/etc/dnsmasq.d
    restart: on-failure
  cloudflared:
    image: crazymax/cloudflared
    container_name: cloudflared
    # networks:
    #   pihole:
    #     ipv4_address: 172.20.0.3
    environment:
      - TZ=America/Chicago
      - TUNNEL_DNS_UPSTREAM=https://1.1.1.1/dns-query,https://1.0.0.1/dns-query
    restart: on-failure
