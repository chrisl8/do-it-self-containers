services:
  cloudflared:
    image: cloudflare/cloudflared
    container_name: cloudflared
    command: tunnel --config /home/nonroot/.cloudflared/config.yml --metrics 127.0.0.1:20241 run
    volumes:
      - ${VOL_CLOUDFLARED_CONFIG:-~/container-data}/container-mounts/cloudflared/config:/home/nonroot/.cloudflared
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    network_mode: host
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD",
          "cloudflared",
          "tunnel",
          "--metrics",
          "127.0.0.1:20241",
          "ready",
        ]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
