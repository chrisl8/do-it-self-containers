# https://infisical.com/docs/self-hosting/deployment-options/docker-compose
# Self-hosted secret manager for injecting credentials into containers.
# Bootstrap with: scripts/setup-infisical.sh
services:
  infisical:
    container_name: infisical
    # Pin to a specific version for stability
    image: infisical/infisical:v0.132.2-postgres
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    # Localhost-only: the web-admin, setup script, and all-containers.sh
    # all reach the API on localhost. Infisical is intentionally not exposed
    # to the network — secrets shouldn't leave the host.
    ports:
      - 127.0.0.1:8085:8080
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SITE_URL=${INFISICAL_SITE_URL:-http://localhost:8085}
      - DB_CONNECTION_URI=postgresql://infisical:${DB_PASSWORD}@infisical-db:5432/infisical
      - REDIS_URL=redis://infisical-redis:6379
      # Telemetry opt-out
      - TELEMETRY_ENABLED=false
    networks:
      - infisical-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/status"]
      start_period: 300s
      start_interval: 10s
      interval: 5m
      timeout: 10s
      retries: 3
    restart: on-failure
  infisical-db:
    container_name: infisical-db
    image: postgres:14-alpine
    environment:
      - POSTGRES_DB=infisical
      - POSTGRES_USER=infisical
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ${VOL_INFISICAL_DB:-~/container-data}/container-mounts/infisical/db:/var/lib/postgresql/data
    networks:
      - infisical-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    restart: on-failure
  infisical-redis:
    container_name: infisical-redis
    image: redis:7-alpine
    volumes:
      - ${VOL_INFISICAL_REDIS:-~/container-data}/container-mounts/infisical/redis:/data
    networks:
      - infisical-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    restart: on-failure
networks:
  infisical-net:
